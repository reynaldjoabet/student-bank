name: Scala CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Security: apply the principle of least privilege
permissions:
  contents: read

# Cancel in-progress runs on the same ref when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Java ${{ matrix.java }} (${{ matrix.distribution }}) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
        distribution: [temurin, corretto]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }} (${{ matrix.distribution }})
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
          cache: 'sbt'
          check-latest: false
          cache-dependency-path: |
            **/*.sbt
            **/project/build.properties
            **/project/*.scala
            **/project/**/*.scala

      - name: Set up sbt
        uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: 2.0.0-RC16

      - name: Check formatting
        run: sbt "scalafmtCheckAll; scalafmtSbtCheck"

      - name: Compile
        run: sbt "Test / compile"

      - name: Run tests
        run: sbt test