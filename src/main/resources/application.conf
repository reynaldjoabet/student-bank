app {

  # ---------- Database (PostgreSQL via skunk + HikariCP for migrations) ----------
  db {
    host     = "localhost"
    host     = ${?DB_HOST}
    port     = 5432
    port     = ${?DB_PORT}
    user     = ${DB_USER}
    password = ${?DB_PASSWORD}            # optional in dev, required in prod
    database = ${DB_NAME}

    # SSL: disable | allow | prefer | require | verify-ca | verify-full
    # Production should use at least "require"; "verify-full" if you trust the CA chain.
    ssl = "require"
    ssl = ${?DB_SSL}

    # Connection pool sizing. Match to `max_connections / replicas` upstream.
    pool-min = 4
    pool-min = ${?DB_POOL_MIN}
    pool-max = 16
    pool-max = ${?DB_POOL_MAX}

    # Timeouts: fail fast on hung sockets, never let one query block a worker forever.
    connect-timeout         = 5 seconds
    socket-timeout          = 30 seconds
    statement-timeout       = 30 seconds
    idle-timeout            = 10 minutes
    max-lifetime            = 30 minutes
    leak-detection-threshold = 2 minutes

    # Postgres `application_name` shows up in pg_stat_activity — invaluable for ops.
    application-name = "student-bank"
    application-name = ${?DB_APP_NAME}
  }

  # ---------- HTTP server (http4s ember) ----------
  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}

    # ember timeouts — keep below upstream LB timeouts.
    request-timeout         = 30 seconds
    idle-timeout            = 60 seconds
    response-header-timeout = 10 seconds
    shutdown-timeout        = 15 seconds   # SIGTERM → drain in-flight requests

    # Limits — reject oversized requests before they hit handlers.
    max-header-size = 8192       # bytes
    max-entity-size = 1048576    # 1 MiB
    max-connections = 1024
  }

  # ---------- Observability (otel4s + Kamon + Datadog) ----------
  observability {
    service-name = "student-bank"
    service-name = ${?OTEL_SERVICE_NAME}

    environment  = "production"
    environment  = ${?APP_ENV}

    # OTLP exporter endpoint (gRPC/HTTP). Empty disables tracing export.
    otel-endpoint = ""
    otel-endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}

    # Root log level: trace | debug | info | warn | error
    log-level = "info"
    log-level = ${?LOG_LEVEL}

    metrics-enabled = true
    metrics-enabled = ${?METRICS_ENABLED}
    tracing-enabled = true
    tracing-enabled = ${?TRACING_ENABLED}
  }

  # ---------- Security ----------
  security {
    # Pepper for the SSN HMAC. MUST be unique per environment and rotated via secrets manager.
    ssn-pepper-seed = ${SSN_PEPPER_SEED}

    # Password hashing cost (bcrypt rounds). 12 ≈ ~250ms on modern CPUs.
    password-hash-rounds = 12
    password-hash-rounds = ${?PASSWORD_HASH_ROUNDS}

    jwt {
      issuer   = "student-bank"
      issuer   = ${?JWT_ISSUER}
      audience = "student-bank-api"
      audience = ${?JWT_AUDIENCE}

      access-token-ttl  = 15 minutes
      refresh-token-ttl = 30 days

      # HS256 signing key — rotate via secrets manager. Min 256 bits (32+ chars).
      signing-key = ${JWT_SIGNING_KEY}
    }

    # Secrets backend: env | vault
    secrets-backend = "env"
    secrets-backend = ${?SECRETS_BACKEND}

    # CORS allow-list. Empty = block all cross-origin requests.
    allowed-origins = []
    allowed-origins = ${?ALLOWED_ORIGINS}   # JSON array string in env, or HOCON list
  }
}
